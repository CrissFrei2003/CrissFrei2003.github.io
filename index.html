<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio Personal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p1Yw2Fqk1OtSWT8gJtIhXCTITVEWilQoNqT9XyM1q9WlH0zZlIsfRSAxEPPYUajF1iGaGL3hZz+7yOzX5GkXgA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <div class="header-card">
            <div class="header-left">
                <div class="profile">
                    <img id="profile-pic" src="https://via.placeholder.com/100" alt="Foto de perfil">
                </div>
                <div class="header-info">
                    <h1 id="name">Nombre Apellido</h1>
                    <p id="career">Carrera en curso</p>
                    <p id="bio" class="bio">Breve descripción personal o lema.</p>
                    <div id="badges" class="badges">
                        <!-- badges dinámicos -->
                    </div>
                </div>
            </div>
            <nav class="header-nav">
                <ul class="tabs">
                    <li><a href="#" data-section="historia" class="tab">Mi Historia</a></li>
                    <li><a href="#" data-section="logros" class="tab">Logros</a></li>
                    <li><a href="#" data-section="certificados" class="tab">Certificados</a></li>
                    <li><a href="#" data-section="herramientas" class="tab">Herramientas</a></li>
                </ul>
            </nav>
            <div class="header-right social">
                <a href="https://wa.me/" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
                <a href="https://instagram.com/" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://linkedin.com/" target="_blank" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </header>
    <main id="main-area">
        <section class="about-section card" id="about-section">
            <h2>Sobre mí</h2>
            <div class="about-inner">
                <img id="about-pic" src="assets/profile.jpg" alt="Foto de perfil">
                <div class="about-text">
                    <p id="about-text">Breve descripción sobre ti. Edita `data.json` para personalizar este texto.</p>
                </div>
            </div>
        </section>

        <section class="gallery-section card" id="gallery-section">
            <h2>Fotografías</h2>
            <div class="carousel" id="carousel">
                <button class="carousel-btn prev" id="carousel-prev" aria-label="Anterior">‹</button>
                <div class="carousel-viewport">
                    <div class="carousel-track" id="carousel-track">
                        <!-- Slides serán añadidos dinámicamente -->
                    </div>
                </div>
                <button class="carousel-btn next" id="carousel-next" aria-label="Siguiente">›</button>
                <div class="carousel-dots" id="carousel-dots" aria-hidden="false"></div>
            </div>
        </section>

        <div id="content">
            <!-- dynamic content loaded here -->
        </div>
    </main>
    <footer>
        <p>&copy; <span id="year"></span> Portafolio</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
